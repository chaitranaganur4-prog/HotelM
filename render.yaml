services:
  - type: web
    name: hotelm-backend-final
    runtime: python
    repo: https://github.com/chaitranaganur4-prog/HotelM
    branch: main
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotelm-db
          property: connectionString
      # Fallback to manual value if not linked to a Render database object
      - key: DATABASE_URL
        sync: false 
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: POETRY_VERSION
        value: none # Explicitly disable poetry setup to save time
